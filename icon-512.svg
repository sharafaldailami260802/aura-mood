<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9BAF91"/>
      <stop offset="100%" style="stop-color:#7A8D70"/>
    </linearGradient>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg512)"/>
  <!-- Soft inner glow -->
  <circle cx="256" cy="256" r="140" fill="#FAF7F2" opacity="0.2"/>
  <!-- Aura curve (subtle arc) -->
  <path d="M 148 318 Q 256 258 364 318" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Letter A -->
  <text x="256" y="292" font-family="Georgia, serif" font-size="200" font-weight="600" fill="#fff" text-anchor="middle" filter="url(#glow512)">A</text>
</svg>
